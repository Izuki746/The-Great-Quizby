
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Great Quizby | AI-Powered Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#ee8c2b',
              secondary: '#7c3aed',
              'uom-purple': '#2d1b4d',
              'uom-deep': '#1a102b',
              'background-dark': '#0f0a1a',
              surface: '#1E1426',
            },
            fontFamily: {
              display: ['Space Grotesk', 'sans-serif'],
              body: ['Outfit', 'sans-serif'],
            },
            animation: {
              'pulse-glow': 'pulse-glow 3s infinite ease-in-out',
              'float': 'float 6s ease-in-out infinite',
              'loading-bar': 'loading-bar 2s ease-in-out infinite',
              'fade-in': 'fade-in 0.5s ease-out forwards',
            },
            keyframes: {
              'pulse-glow': {
                '0%, 100%': { boxShadow: '0 0 40px -10px rgba(238, 140, 43, 0.3)' },
                '50%': { boxShadow: '0 0 80px 0px rgba(238, 140, 43, 0.6)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              'loading-bar': {
                '0%': { left: '-35%' },
                '50%': { left: '100%' },
                '100%': { left: '100%' },
              },
              'fade-in': {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #0f0a1a;
        color: white;
        font-family: 'Outfit', sans-serif;
      }
      .glass-card {
        background: rgba(26, 21, 35, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f0a1a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #2d1b4d; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ee8c2b; 
      }
      .font-display { font-family: 'Space Grotesk', sans-serif; }
    </style>

}
</script>
